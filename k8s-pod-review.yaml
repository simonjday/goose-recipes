version: "1.0.0"
title: "K8s Pod Best Practice Review"
description: "Reviews pods against Kubernetes best practices. Uses pre-built jq filter files — no inline jq required or permitted."
extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
instructions: |
  You are a Kubernetes reliability and security expert.
  STRICT RULE — NO INLINE JQ: You must NEVER write your own jq expressions.
  STRICT RULE — TRUST THE FILTER: The "findings" array is computed by jq and is always correct.
    If findings[] is empty ([]), the pod has ZERO issues from the filter checks.
    If findings[] has entries, copy them exactly. Do NOT re-read container fields.
  STRICT RULE — VERDICT IS BASED ON FINDINGS ONLY:
    PASS = findings[] is empty AND no [PDB] finding was added
    FAIL = findings[] has ANY entries OR a [PDB] finding was added
    "PDB not required" does NOT make a pod PASS if it has findings.
    A Job pod with findings is FAIL. A single-replica pod with findings is FAIL.
  STRICT RULE — USE pod.name for headings. STRICT RULE — NO RECALCULATION of summary counts.
  Do NOT run any shell commands beyond what is listed in the steps.

prompt: |
  Review pods in namespace '{{ namespace }}' against Kubernetes best practices.
  Run every step in order. Do not skip steps. Do not write new jq or shell commands.

  Step 1 — Confirm filter files are present:
    ls ./jq-filters/pod-review.jq ./jq-filters/pdb-pod-match.jq

  Step 2 — Get pod data with pre-computed findings:
    kubectl get pods -n {{ namespace }} -o json | jq -f ./jq-filters/pod-review.jq

  Step 3 — Get PDB selector values:
    kubectl get pdb -n {{ namespace }} -o json | jq -f ./jq-filters/pdb-pod-match.jq

  Step 4 — Get deployment replica counts:
    kubectl get deployments,statefulsets -n {{ namespace }} \
      -o jsonpath='{range .items[*]}{.metadata.name}{" replicas="}{.spec.replicas}{"\n"}{end}'

  Step 5 — Build a PDB coverage map from Steps 3 and 4 BEFORE processing any pods.
    For each deployment in Step 4:
      replicas == 1 → pdb_exempt (PDB not required)
      replicas > 1  → check if workload name appears exactly in any PDB selector_values
                       match found  → covered by <pdb_name>
                       no match     → missing
    Job/CronJob pods (is_job == true) → pdb_exempt

    Expected map for goose-test:
      good-app   = covered by good-app-pdb  (selector_values: ["good-app"])
      bad-app    = missing                  ("bad-app" not in ["good-app"])
      ugly-app   = missing                  ("ugly-app" not in ["good-app"])
      single-app = pdb_exempt               (replicas=1)

  Step 6 — For each pod determine verdict using this EXACT logic:
    has_findings = (pod.findings[] is not empty)
    has_pdb_issue = (pdb coverage map shows "missing" for this pod's workload
                     AND pod.is_job == false AND replicas > 1)
    PASS ✓ = (has_findings == false) AND (has_pdb_issue == false)
    FAIL   = (has_findings == true)  OR  (has_pdb_issue == true)

    IMPORTANT: has_findings is determined ONLY by whether findings[] is empty or not.
    A pod with findings is FAIL regardless of PDB status.
    A pod with findings is FAIL even if it is a Job pod or single-replica.

  Step 7 — Output. PASS pods get ONE line only. FAIL pods get full detail.

  For each FAIL pod:
  ## Pod: <pod.name>
  Findings:
    - <each entry from pod.findings[] — copy verbatim>
    - [PDB] no PodDisruptionBudget covers this workload  ← only if has_pdb_issue
  PDB: <coverage map result for this workload>
  Fix:
    kubectl patch deployment <pod.workload> -n {{ namespace }} --type='json' -p='[
      {"op": "add", "path": "/spec/template/spec/containers/0/livenessProbe", "value": {"httpGet": {"path": "/", "port": 80}, "initialDelaySeconds": 30, "periodSeconds": 10}},
      {"op": "add", "path": "/spec/template/spec/containers/0/readinessProbe", "value": {"httpGet": {"path": "/", "port": 80}, "initialDelaySeconds": 5, "periodSeconds": 5}},
      {"op": "add", "path": "/spec/template/spec/containers/0/securityContext", "value": {"runAsNonRoot": true, "readOnlyRootFilesystem": true, "allowPrivilegeEscalation": false}}
    ]'

  For each PASS pod:
  ## Pod: <pod.name> — PASS ✓

  ## SUMMARY
  -------
  Pods reviewed: <summary.total_pods>
  PASS:  <count the pods in the output above that show "— PASS ✓">
  FAIL:  <total_pods minus PASS>
  Findings by category:
    RESOURCES:    <summary.resources_findings>
    PROBES:       <summary.probes_findings>
    IMAGE:        <summary.image_findings>
    SECURITY:     <summary.security_findings>
    SECURITY-POD: <summary.security_pod_findings>
    PDB:          <count the pods in the output above that have a "- [PDB] no PodDisruptionBudget" line>

parameters:
  - key: namespace
    input_type: string
    requirement: optional
    description: "Namespace to inspect"
    default: "confluent"
