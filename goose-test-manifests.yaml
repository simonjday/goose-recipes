# goose-test namespace — sample resources for testing Goose recipes
#
# What each resource exercises:
#   good-app      — passes pod-review: pinned digest, resources, probes, security ctx, PDB, 3 replicas
#   bad-app       — fails: latest tag + Always pull policy, no probes, no security ctx, no PDB
#   ugly-app      — fails: untagged image, no probes, no security ctx, no PDB
#                   (has minimal resources to satisfy Kyverno require-resource-limits policy)
#   single-app    — single replica, no PDB needed (should not be flagged)
#   completed-job — stale-resource-cleanup: succeeded job
#   scheduled-job — CronJob present
#   stale-config  — unused ConfigMap (no pod references it)
#   unused-secret — unused Secret (no pod references it)
#   app-config    — used ConfigMap (referenced by good-app)
#   app-secret    — used Secret (referenced by good-app)
#   goose-test-quota  — ResourceQuota (namespace-resource-quota recipe)
#   goose-test-limits — LimitRange (namespace-resource-quota recipe)
#   good-app-pdb  — PDB covering good-app (pdb-coverage recipe)
#
# Policy notes:
#   - require-pod-labels (Enforce):        all pod templates carry app + env labels
#   - require-resource-limits (Enforce):   all pod templates carry requests + limits
#   - disallow-privileged (Enforce):       no privileged containers
#   - disallow-latest-tag (Audit):         bad-app and ugly-app intentionally violate this
#                                          NOTE: Audit only — pods are admitted but flagged
#   - mutate-add-readonly-rootfs (Mutate): injects readOnlyRootFilesystem: true on all pods
#                                          bad-app and ugly-app use emptyDir volumes so nginx/busybox
#                                          can still write to required paths
#
# Apply with:
#   kubectl delete namespace goose-test && kubectl apply -f goose-test-manifests.yaml
#
# Run recipes against it with:
#   goose run --model qwen3-coder:30b --recipe k8s-pod-review.yaml --params namespace=goose-test --no-session 2>&1 | glow -
#   goose run --model qwen3-coder:30b --recipe pdb-coverage.yaml --params scope=goose-test --no-session 2>&1 | glow -
#   goose run --model qwen3-coder:30b --recipe image-tag-audit.yaml --params scope=goose-test --no-session 2>&1 | glow -
#   goose run --model qwen3-coder:30b --recipe stale-resource-cleanup.yaml --params namespace=goose-test --no-session 2>&1 | glow -
#   goose run --model qwen3-coder:30b --recipe namespace-resource-quota.yaml --params scope=goose-test --no-session 2>&1 | glow -

---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: goose-test
---
# ── ConfigMaps ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: goose-test
data:
  ENV: production
  LOG_LEVEL: info
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stale-config
  namespace: goose-test
data:
  OLD_KEY: old-value
---
# ── Secrets ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: goose-test
type: Opaque
stringData:
  DB_PASSWORD: s3cr3t
---
apiVersion: v1
kind: Secret
metadata:
  name: unused-secret
  namespace: goose-test
type: Opaque
stringData:
  OLD_TOKEN: abc123
---
# ── GOOD deployment ───────────────────────────────────────────────────────────
# Passes all policies and pod-review recipe checks:
#   - image pinned to digest (immutable, no :latest)
#   - resource requests + limits set
#   - liveness + readiness probes configured
#   - security context hardened (non-root, no privilege escalation, read-only rootfs)
#   - 3 replicas with PDB covering it
#   - uses ConfigMap and Secret (not stale)
#
# Refresh the digest before applying:
#   crane digest nginx:1.25.3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-app
  namespace: goose-test
  labels:
    app: good-app
    env: test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: good-app
  template:
    metadata:
      labels:
        app: good-app
        env: test
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: good-app
          image: nginx:1.25.3  # replace with: nginx@sha256:<digest from crane digest nginx:1.25.3>
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
# ── PDB for good-app ──────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: good-app-pdb
  namespace: goose-test
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: good-app
---
# ── BAD deployment ────────────────────────────────────────────────────────────
# Intentionally non-compliant — exercises image-tag-audit and pod-review recipes:
#   - nginx:latest (mutable tag, no digest) — violates disallow-latest-tag (Audit)
#   - imagePullPolicy: Always (unnecessary with pinned images)
#   - no liveness or readiness probes
#   - no security context (readOnlyRootFilesystem injected by Kyverno mutate policy)
#   - 2 replicas with no PDB
#   - emptyDir volumes allow nginx to write cache/pid files despite read-only rootfs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-app
  namespace: goose-test
  labels:
    app: bad-app
    env: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bad-app
  template:
    metadata:
      labels:
        app: bad-app
        env: test
    spec:
      containers:
        - name: bad-app
          image: nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
# ── UGLY deployment ───────────────────────────────────────────────────────────
# Intentionally non-compliant — exercises image-tag-audit and pod-review recipes:
#   - busybox with no tag at all — violates disallow-latest-tag (Audit)
#   - no liveness or readiness probes
#   - no security context
#   - 2 replicas with no PDB
#   - emptyDir volumes for compatibility with read-only rootfs mutate injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugly-app
  namespace: goose-test
  labels:
    app: ugly-app
    env: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ugly-app
  template:
    metadata:
      labels:
        app: ugly-app
        env: test
    spec:
      containers:
        - name: ugly-app
          image: busybox
          command: ["sh", "-c", "while true; do sleep 30; done"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# ── Single replica deployment ─────────────────────────────────────────────────
# 1 replica — intentionally no PDB (single replicas don't need one)
# Should NOT be flagged by pdb-coverage recipe
# Intentionally weak security context to exercise pod-review recipe
apiVersion: apps/v1
kind: Deployment
metadata:
  name: single-app
  namespace: goose-test
  labels:
    app: single-app
    env: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: single-app
  template:
    metadata:
      labels:
        app: single-app
        env: test
    spec:
      containers:
        - name: single-app
          image: nginx:1.25.3
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
# ── Services ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: good-app-svc
  namespace: goose-test
spec:
  selector:
    app: good-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bad-app-svc
  namespace: goose-test
spec:
  selector:
    app: bad-app
  ports:
    - port: 80
      targetPort: 80
---
# ── Completed Job ─────────────────────────────────────────────────────────────
# For stale-resource-cleanup recipe — a succeeded job that should be flagged
apiVersion: batch/v1
kind: Job
metadata:
  name: completed-job
  namespace: goose-test
spec:
  template:
    metadata:
      labels:
        app: completed-job
        env: test
    spec:
      containers:
        - name: job
          image: busybox
          command: ["sh", "-c", "echo done"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      restartPolicy: Never
  backoffLimit: 0
---
# ── CronJob ───────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduled-job
  namespace: goose-test
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: scheduled-job
            env: test
        spec:
          containers:
            - name: cron
              image: busybox
              command: ["sh", "-c", "echo tick"]
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
          restartPolicy: Never
---
# ── ResourceQuota ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: goose-test-quota
  namespace: goose-test
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
---
# ── LimitRange ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: goose-test-limits
  namespace: goose-test
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      type: Container
