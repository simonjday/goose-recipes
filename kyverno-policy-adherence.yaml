version: "1.0.0"
title: "Kyverno Policy Adherence Review"
description: "Checks Kyverno policy reports for violations. References pre-built jq filter files — no inline jq, no shell quoting issues."
extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
instructions: |
  You are a Kubernetes security and policy expert specialising in Kyverno.
  STRICT RULE — NO INLINE JQ: Never write your own jq expressions.
  Use jq -f with the pre-built filter files in ./jq-filters/
  Run the exact commands shown in each step. Do not modify or rewrite them.
  If a command errors, report it and continue — do not attempt to fix the jq.
  IMPORTANT: Use jq -f with pre-built filter files in ./jq-filters/
  Do NOT write inline jq — always reference the filter files with jq -f <path>.
prompt: |
  Check Kyverno policy adherence for namespace '{{ namespace }}'.

  Step 1 — Confirm filter files exist:
    ls ./jq-filters/policyreport.jq ./jq-filters/kyverno-policies.jq

  Step 2 — Check Kyverno is running:
    kubectl get pods -n kyverno \
      -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\n"}{end}' 2>/dev/null \
      || echo "Kyverno not found in kyverno namespace"

  Step 3 — Get namespace policy reports:
    kubectl get policyreport.wgpolicyk8s.io -n {{ namespace }} -o json | \
      jq -f ./jq-filters/policyreport.jq

  Step 4 — Get cluster policy reports:
    kubectl get clusterpolicyreport.wgpolicyk8s.io -o json | \
      jq -f ./jq-filters/policyreport.jq

  Step 5 — Get active policies for enforcement mode context:
    kubectl get clusterpolicies.kyverno.io -o json | \
      jq -f ./jq-filters/kyverno-policies.jq
    kubectl get policies.kyverno.io -n {{ namespace }} -o json | \
      jq -f ./jq-filters/kyverno-policies.jq

  Step 6 — Evaluate and output:

  SUMMARY
  -------
  Namespace: {{ namespace }}
  Pass: <n> | Fail: <n> | Warn: <n> | Skip: <n>
  Enforce policies: <n> | Audit policies: <n>

  VIOLATIONS
  ----------
  Policy/Rule: <policy>/<rule> | Resource: <kind>/<n>
  Severity: <level> | Mode: Enforce/Audit
  Message: <message>
  Fix: <kubectl patch or yaml>

  AUDIT-ONLY POLICIES (consider promoting):
  <policy>:
    kubectl patch clusterpolicy <n> --type merge \
      -p '{"spec":{"validationFailureAction":"Enforce"}}'

  If no violations: "Namespace {{ namespace }} — COMPLIANT ✓"

parameters:
  - key: namespace
    input_type: string
    requirement: optional
    description: "Namespace to check policy adherence for"
    default: "confluent"
