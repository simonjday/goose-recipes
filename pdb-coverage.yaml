version: "1.0.0"
title: "PodDisruptionBudget Coverage Audit"
description: "Cluster-wide audit of workloads with replicas > 1 missing a PDB. References pre-built jq filter files — no inline jq, no shell quoting issues."
extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
instructions: |
  You are a Kubernetes reliability engineer.
  STRICT RULE — NO INLINE JQ: Never write your own jq expressions.
  Use jq -f with the pre-built filter files in ./jq-filters/
  Run the exact commands shown in each step. Do not modify or rewrite them.
  If a command errors, report it and continue — do not attempt to fix the jq.
  Do NOT run any shell commands beyond what is listed in the steps.
  Do NOT re-evaluate or re-process data — read it directly from filter output.
  Prioritise StatefulSets (Kafka brokers) as highest risk when missing a PDB.
prompt: |
  Audit PodDisruptionBudget coverage across {{ scope }}.

  Step 1 — Confirm filter files exist:
    ls ./jq-filters/workload-filter.jq ./jq-filters/pdb-filter.jq

  Step 2 — Get namespaces:
    {% if scope == "cluster" %}
    kubectl get namespaces -o json | \
      jq -r '.items[] | select(.metadata.name | test("^kube-|^openshift-") | not) | .metadata.name'
    {% else %}
    echo "{{ scope }}"
    {% endif %}

  Step 3 — For each namespace get workloads with replicas > 1:
    kubectl get deployments -n <namespace> -o json | jq -f ./jq-filters/workload-filter.jq
    kubectl get statefulsets -n <namespace> -o json | jq -f ./jq-filters/workload-filter.jq

    The filter already filters to replicas > 1 only and returns:
      kind, name, namespace, replicas, selector (matchLabels)

  Step 4 — For each namespace get PDBs:
    kubectl get pdb -n <namespace> -o json | jq -f ./jq-filters/pdb-filter.jq

    Returns: name, namespace, selector (matchLabels), minAvailable, maxUnavailable

  Step 5 — YOU NOW HAVE ALL THE DATA. Do not run any more commands.
    For each workload from Step 3, determine PDB coverage by label matching:
    - A workload is PROTECTED if any PDB from Step 4 has a selector that is a
      subset of the workload's selector matchLabels (i.e. all PDB selector keys/values
      appear in the workload selector).
    - A workload is UNPROTECTED if no PDB selector matches.
    - Also flag MISCONFIGURED: PDB exists but minAvailable == replicas (blocks all disruptions).

    Priority:
      HIGH   = StatefulSet with replicas > 1, no matching PDB
      MEDIUM = Deployment with replicas > 1, no matching PDB
      LOW    = PDB exists but misconfigured

  Step 6 — Output:

  PDB COVERAGE AUDIT — {{ scope }}

  SUMMARY: Checked: <n> | Protected: <n> ✓ | StatefulSets missing PDB: <n> HIGH | Deployments missing PDB: <n> MEDIUM | Misconfigured: <n> LOW

  HIGH — StatefulSets missing PDB:
  <namespace>/<name> (replicas: <n>, selector: <key=value>)
  Fix:
    kubectl apply -f - <<EOF
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: <name>-pdb
      namespace: <namespace>
    spec:
      minAvailable: <replicas - 1>
      selector:
        matchLabels: <selector>
    EOF

  MEDIUM — Deployments missing PDB:
  <same format>

  MISCONFIGURED PDBs:
  <namespace>/<pdb>: minAvailable=<n> equals replicas=<n> — blocks all voluntary disruptions

  PROTECTED ✓:
  <namespace>/<name> (replicas: <n>) → covered by <pdb-name>

parameters:
  - key: scope
    input_type: string
    requirement: optional
    description: "Either 'cluster' for all namespaces or a specific namespace name"
    default: "cluster"
