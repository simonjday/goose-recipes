version: "1.0.0"
title: "Container Image Tag Audit"
description: "Scans for containers using 'latest' or untagged images. References pre-built jq filter files from ./jq-filters/ — no inline jq, no shell quoting issues."
extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
instructions: |
  You are a Kubernetes security engineer focused on supply chain security.
  STRICT RULE — NO INLINE JQ: Never write your own jq expressions.
  Use jq -f with the pre-built filter files in ./jq-filters/
  Run the exact commands shown in each step. Do not modify or rewrite them.
  If a command errors, report it and continue — do not attempt to fix the jq.
  IMPORTANT: After steps 2 and 3 you have ALL the data you need.
  Do NOT run any further shell commands after step 3.
  Do NOT write any jq, grep, cut, awk or other commands to process the output.
  Do NOT recalculate or re-count anything — the filter output contains exact counts.
  Copy the numbers from the filter output directly into the report — do not derive them yourself.
prompt: |
  Perform a container image tag audit across {{ scope }}.

  Step 1 — Confirm filter files exist:
    ls ./jq-filters/img-audit.jq ./jq-filters/deploy-audit.jq

  Step 2 — Extract and classify all container images:
    {% if scope == "cluster" %}
    kubectl get pods --all-namespaces -o json | jq -f ./jq-filters/img-audit.jq
    {% else %}
    kubectl get pods -n {{ scope }} -o json | jq -f ./jq-filters/img-audit.jq
    {% endif %}

    The filter returns two sections:
      "summary": pre-counted totals — total_pods, critical, high, ok
      "pods": each pod with containers, each container has a "classification" field:
        "CRITICAL-untagged" = bare image name with no tag (e.g. busybox)
        "CRITICAL-latest"   = image tagged :latest
        "HIGH"              = named tag, no @sha256: digest
        "OK"                = digest pinned with @sha256:

  Step 3 — Get deployment pull policies:
    {% if scope == "cluster" %}
    kubectl get deployments --all-namespaces -o json | jq -f ./jq-filters/deploy-audit.jq
    {% else %}
    kubectl get deployments -n {{ scope }} -o json | jq -f ./jq-filters/deploy-audit.jq
    {% endif %}

  Step 4 — YOU NOW HAVE ALL THE DATA. Do not run any more commands.
    Use the "summary" block from Step 2 for all counts in the report — copy them exactly.
    Use the "classification" field on each container to populate the findings tables.
    Both "CRITICAL-untagged" and "CRITICAL-latest" go in the CRITICAL table.
    Look up pullPolicy from Step 3 by matching deployment name to pod name prefix.
    If a pod has no matching deployment (e.g. Job, CronJob pods) set Pull Policy to "-".
    Flag any CRITICAL image with pullPolicy=Always as highest risk.
    List every pod individually — do not deduplicate or group.

  Step 5 — Output:

  CONTAINER IMAGE TAG AUDIT
  --------------------------
  Scope: {{ scope }}

  SUMMARY
  -------
  Total pods scanned: <summary.total_pods from Step 2>
  CRITICAL (latest/untagged): <summary.critical from Step 2>
  HIGH (named tag, no digest): <summary.high from Step 2>
  OK (digest pinned): <summary.ok from Step 2>

  CRITICAL IMAGES:
  ----------------
  Namespace | Pod | Container | Image | Classification | Pull Policy
  <one row per CRITICAL container — findings or "None found ✓">

  Fix — get current digest from running pod then pin in deployment:
    kubectl get pod <pod> -n <namespace> \
      -o jsonpath='{.status.containerStatuses[0].imageID}'
    image: <registry>/<image>:<tag>@sha256:<digest>

  HIGH IMAGES (top 10):
  ----------------------
  Namespace | Pod | Container | Image
  <one row per HIGH container — findings or "None found ✓">

  NAMESPACE SUMMARY:
  ------------------
  Namespace | Critical | High | OK | Total
  <use summary counts from Step 2>

  KYVERNO POLICY RECOMMENDATION:
  --------------------------------
  If no disallow-latest-tag policy exists:
    kubectl apply -f - <<EOF
    apiVersion: kyverno.io/v1
    kind: ClusterPolicy
    metadata:
      name: disallow-latest-tag
    spec:
      validationFailureAction: Audit
      rules:
      - name: require-image-tag
        match:
          any:
          - resources:
              kinds: [Pod]
        validate:
          message: "Image tag 'latest' is not allowed"
          pattern:
            spec:
              containers:
              - image: "!*:latest"
    EOF

parameters:
  - key: scope
    input_type: string
    requirement: optional
    description: "Either a specific namespace or 'cluster' for all namespaces. Start with a specific namespace before running cluster-wide."
    default: "confluent"
